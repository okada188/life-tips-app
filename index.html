<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Tips - 生活の知恵</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="app-container">
        <header class="glass-panel header-container">
            <h1>✨ Life Tips</h1>
            <div class="header-right">
                <nav class="header-nav">
                    <button id="nav-home-btn" class="nav-btn active">ホーム</button>
                    <button id="nav-mypage-btn" class="nav-btn">マイページ</button>
                </nav>
                <div class="auth-container">
                    <button id="google-login-btn" class="primary-btn login-btn">
                        ログイン
                    </button>
                    <div id="user-profile" class="hidden">
                        <span id="user-name-display"></span>
                        <button id="logout-btn" class="secondary-btn small-btn">ログアウト</button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Home View -->
        <main id="home-view">
            <!-- Post Form Section -->
            <section class="post-form-section glass-panel">
                <div id="post-trigger-container" class="post-trigger-row">
                    <input type="text" placeholder="知恵をシェアする... (ログインが必要です)" readonly id="post-trigger-input" />
                    <button id="open-post-form-btn" class="primary-btn">投稿する</button>
                </div>
                
                <form id="post-form" class="hidden">
                    <input type="text" id="post-title" placeholder="タイトル (必須: 例: 10分でできるシンク掃除)" required />
                    <textarea id="post-content" placeholder="裏ワザの詳細を教えてください！(必須)" rows="4" required></textarea>
                    
                    <div style="margin-bottom: 1rem;">
                        <label style="font-size: 0.9rem; color: var(--text-muted); font-weight: 600;">画像 (任意):</label><br>
                        <input type="file" id="post-image" accept="image/*" class="file-input" />
                    </div>
                    
                    <div class="form-footer">
                        <div class="category-group">
                            <select id="post-category" required>
                                <!-- Categories dynamically loaded -->
                            </select>
                            <button type="button" id="add-category-btn" class="secondary-btn small-btn">+ 追加</button>
                        </div>
                        
                        <div class="form-actions">
                            <span id="draft-saved-msg" class="success-msg hidden" style="font-size:0.8rem; margin-top:10px;">下書き保存済み</span>
                            <button type="button" id="save-draft-btn" class="secondary-btn">下書き保存</button>
                            <button type="button" id="cancel-post-btn" class="secondary-btn">キャンセル</button>
                            <button type="submit" class="primary-btn">シェアする</button>
                        </div>
                    </div>
                </form>
            </section>

            <!-- Filter & Sort -->
            <section class="filters-section glass-panel">
                <div id="filters-container" class="filters">
                    <!-- Filter buttons dynamically loaded -->
                </div>
                <div class="sort-container">
                    <label for="sort-select">並び替え:</label>
                    <select id="sort-select">
                        <option value="latest">更新順 (新着)</option>
                        <option value="likes">評価数が多い順</option>
                    </select>
                </div>
            </section>

            <!-- Posts List -->
            <section id="posts-container" class="posts-list">
                <!-- Posts will be rendered here dynamically -->
            </section>
        </main>

        <!-- My Page View -->
        <main id="mypage-view" class="hidden">
            <section class="glass-panel mypage-section">
                <h2>👤 マイページ</h2>
                
                <div class="mypage-user-header">
                    <h3 class="mypage-username">
                        表示名: <span id="mypage-name-text"></span> 
                        <button id="edit-name-btn" class="icon-btn" title="名前を編集">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="vertical-align: middle;">
                              <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                            </svg>
                        </button>
                    </h3>
                </div>

                <div id="mypage-stats" class="stats-container">
                    <div class="stat-box">
                        <h3>獲得した総いいね数</h3>
                        <p id="total-likes" class="stat-number">0 ❤️</p>
                    </div>
                </div>
                
                <h3 class="mypost-title">自分の投稿履歴</h3>
                <section id="my-posts-container" class="posts-list">
                    <!-- My Posts rendered here -->
                </section>
            </section>
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast-notification" class="toast hidden"></div>

    <!-- Edit Post Modal -->
    <div id="edit-modal" class="modal hidden">
        <div class="modal-content glass-panel">
            <h2>投稿を編集</h2>
            <form id="edit-form">
                <input type="hidden" id="edit-post-id" />
                <input type="text" id="edit-post-title" required />
                <textarea id="edit-post-content" rows="4" required></textarea>
                
                <div style="margin-bottom: 1rem;">
                    <label style="font-size: 0.9rem; color: var(--text-muted); font-weight: 600;">画像を変更 (任意):</label><br>
                    <input type="file" id="edit-post-image" accept="image/*" class="file-input" />
                    <p style="font-size:0.8rem; color:var(--text-muted);">※新しい画像を選択しない場合は既存の画像が維持されます</p>
                </div>

                <div class="form-footer">
                    <select id="edit-post-category" required></select>
                    <div class="form-actions">
                        <button type="button" id="cancel-edit-btn" class="secondary-btn">キャンセル</button>
                        <button type="submit" class="primary-btn">更新する</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
